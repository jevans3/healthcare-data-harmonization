server:
  port: 8082

spring:
  application:
    name: fhir-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}

# Mapping file paths
mappings:
  base-path: ${MAPPINGS_BASE_PATH:mappings}
  tenant-override-path: ${MAPPINGS_TENANT_PATH:mappings/tenants}

# Actuator endpoints for Prometheus scraping and health checks
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: fhir-server
    export:
      prometheus:
        enabled: true

# HAPI FHIR Server configuration
hapi:
  fhir:
    fhir-version: R4
    server-address: ${FHIR_SERVER_URL:http://localhost:8082/fhir}
    validation:
      enabled: true
      request-only: false

# Multi-tenancy
multitenancy:
  tenants: []

# Security
spring.security.oauth2.resourceserver.jwt:
  issuer-uri: ${OAUTH2_ISSUER_URI:https://auth.example.com}
